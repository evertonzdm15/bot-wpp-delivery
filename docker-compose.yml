# Ambiente de desenvolvimento local (Postgres + Redis + Bot)
version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: botdelivery
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  bot:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      TZ: America/Sao_Paulo
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/botdelivery?schema=public
      REDIS_URL: redis://redis:6379
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-https://api.grupodm.site}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-GRUPODM}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      SLA_RAPIDA_R6_MIN: "40"
      SLA_RAPIDA_MIN: "90"
      ALERTA_ANTECEDENCIA_MIN: "15"
    ports:
      - "3000:3000"

volumes:
  pgdata:
  redisdata:
